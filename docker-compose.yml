version: "3.8"

services:
  backend:
    build: 
      ./backend
    ports:
      - "8000:8000"
    volumes: 
      - ./backend:/app
    env_file: 
      .env
    depends_on: 
      - redis

  frontend:
    build: 
      ./frontend
    ports:
      - "3000:3000"
    volumes: 
      - ./frontend:/app
    env_file: 
      .env

  redis:
    image: redis:7-alpine
    ports: 
      - "6379:6379"